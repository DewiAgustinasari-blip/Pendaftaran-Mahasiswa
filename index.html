<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendaftaran Mahasiswa Baru</title>

        <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-validate/1.19.5/jquery.validate.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-validate/1.19.5/additional-methods.min.js"></script>
        <script src="js/script.js"></script>
        <link rel="stylesheet" href="css/style.css">

</head>
<body>

    <div class="container">

    <div class="banner">
        <h1>PENDAFTARAN</h1>
        <h2>MAHASISWA BARU</h2>
        <h3>LP3I CIREBON 2026</h3>
    </div>

    <div class="section-title">
        FORM PENGISIAN DATA CALON MAHASISWA
    </div>

    <form id="formPendaftaran" action="simpan.php" method="POST" enctype="multipart/form-data">
        
        <div class="form-group">
            <label>NIM</label>
            <input type="text" id="nim" name="nim">
            <small class="error" id="errNim"></small>
        </div>

        <div class="form-group">
            <label>Nama Lengkap</label>
            <input type="text" id="nama" name="nama">
            <small class="error" id="errNama"></small>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="text" id="email" name="email">
            <small class="error" id="errEmail"></small>
        </div>

        <div class="form-group">
            <label>Nomor HP</label>
            <input type="text" id="hp" name="hp">
            <small class="error" id="errHp"></small>
        </div>

        <div class="form-group">
            <label>Jenis Kelamin</label>
            <label style="display:inline; font-weight:normal; margin-right:10px;">
                <input type="radio" name="jk" value="Laki-laki"> Laki-laki
            </label>
            <label style="display:inline; font-weight:normal;">
                <input type="radio" name="jk" value="Perempuan"> Perempuan
            </label>
            <small class="error" id="errJk"></small>
        </div>

        <div class="form-group">
            <label>Program Studi</label>
            <select id="prodi" name="prodi">
                <option value="">-- Pilih Program Studi --</option>
                <option>Komputer Administrasi Bisnis</option>
                <option>Teknik Informatika</option>
                <option>Manajemen Informatika</option>
                <option>Komputerisasi Akuntansi</option>
            </select>
            <small class="error" id="errProdi"></small>
        </div>

        <div class="form-group">
            <label>Alamat</label>
            <textarea id="alamat" name="alamat"></textarea>
            <small class="error" id="errAlamat"></small>
        </div>

        <div class="form-group">
            <label>Pas Foto</label>
        <div class="foto-wrapper">
            <div class="foto-input-box">
                <span class="foto-label-text">Format Foto jpg/jpeg/png, maks. 2MB)</span>
                <input type="file" id="foto" name="foto">
                <small class="error" id="errFoto"></small>
            </div>

            <div class="foto-preview-box">
                <img id="previewFoto" src="https://cdn-icons-png.flaticon.com/512/847/847969.png" alt="Preview Pas Foto">
            </div>

        </div>
        </div>

        <div class="button-group">
            <button type="submit">Submit</button>
            <button type="reset" id="btnReset">Reset</button>
        </div>

    </form>

        <div id="hasil"></div>
            <div style="text-align: center;">
            <button id="btnEdit" style="display:none;">
                Edit Data
            </button>
        </div>


</body>
</html>
